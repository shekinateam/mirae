<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>URL 복사</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f2f5;
      font-family: 'Segoe UI', sans-serif;
    }
    .box {
      background: #fff;
      border-radius: 12px;
      padding: 40px 48px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }
    .label {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    .url {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: #4a90e2;
      background: #f5f7fa;
      border: 1.5px solid #d0d7e2;
      border-radius: 8px;
      padding: 14px 24px;
      cursor: pointer;
      word-break: break-all;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .url:hover {
      border-color: #4a90e2;
      background: #eaf2ff;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="label">클릭하면 바로 접속됩니다</div>
    <a class="url" href="https://devmedam.urbanlt.co.kr/admin/login" target="_blank">
      https://devmedam.urbanlt.co.kr/admin/login
    </a>
  </div>
</body>
</html>
